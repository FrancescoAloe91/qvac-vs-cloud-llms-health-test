[browser]
gatherUsageStats = false

[server]
headless = true
showEmailPrompt = false
port = 8501
runOnSave = true
enableCORS = false
enableXsrfProtection = true

[client]
showErrorDetails = true
toolbarMode = "viewer"

[theme]
base = "dark"
primaryColor = "#00d09c"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1a1f2e"
textColor = "#fafafa"
